# SignalPilot — self-contained local stack
#
# Usage: docker compose up --build
#
# Starts: Postgres + MinIO + K3s + Gateway + Web + Sandbox
# No external dependencies, no .env required.

name: signalpilot

services:
  # ─── K3s (local Kubernetes) ──────────────────────────────────────────────
  k3s:
    image: rancher/k3s:v1.31.4-k3s1
    command: server --disable=traefik,metrics-server --tls-san=k3s
    privileged: true
    ports:
      - "127.0.0.1:6443:6443"
      - "30000-30100:30000-30100"
      - "3300:3300"
    environment:
      K3S_TOKEN: ${K3S_TOKEN:-signalpilot-dev}
      K3S_KUBECONFIG_MODE: "644"
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - k3s-config:/etc/rancher/k3s
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-signalpilot}
    ports:
      - "127.0.0.1:5601:5432"
    volumes:
      - signalpilot-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-signalpilot}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-signalpilot}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_dev_only}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - signalpilot-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  gateway:
    build:
      context: ./signalpilot/gateway
      dockerfile: ../../Dockerfile.gateway
    ports:
      - "3300:3300"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-signalpilot}:${POSTGRES_PASSWORD:-changeme_dev_only}@db:5432/${POSTGRES_DB:-signalpilot}
      SP_DATA_DIR: /data
      SP_SANDBOX_MANAGER_URL: http://sandbox:8080
      SP_SANDBOX_TOKEN: ${SP_SANDBOX_TOKEN:-}
      SP_SANDBOX_ENABLED: "true"
      SP_DEPLOYMENT_MODE: ${SP_DEPLOYMENT_MODE:-local}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      SP_SESSION_JWT_SECRET: ${SP_SESSION_JWT_SECRET:-}
      SP_ENCRYPTION_KEY: ${SP_ENCRYPTION_KEY:-5d1aa5ETRcln8vkPWrzDkdfSEuqAua5xcZCWMLMDXmc=}
      SP_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3200,http://localhost:3300,http://localhost:2718
      SP_S3_ENDPOINT_URL: http://minio:9000
      SP_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-signalpilot}
      SP_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme_dev_only}
      SP_S3_BUCKET: signalpilot-data
      SP_S3_REGION: us-east-1
      SP_WORKSPACE_BACKEND: s3
      SP_WORKSPACE_S3_BUCKET: signalpilot-data
      SP_WORKSPACE_S3_REGION: us-east-1
      SP_WORKSPACE_S3_ENDPOINT_URL: http://minio:9000
      SP_K8S_NAMESPACE: default
      SP_K8S_HOST: https://127.0.0.1:6443
      SP_NOTEBOOK_IMAGE: signalpilot-notebook:latest
      SP_NOTEBOOK_UPSTREAM_MODE: pod_ip
      SP_NOTEBOOK_NETWORK_POLICY: "false"
      SP_NOTEBOOK_DIRECT_URL: http://notebook:2718
      SP_GATEWAY_NAMESPACE: signalpilot
      SP_GATEWAY_POD_SELECTOR: "app=signalpilot-gateway"
      SP_PUBLIC_GATEWAY_PORT: "3300"
      KUBECONFIG: /k3s/k3s.yaml
      SP_REPOS_DIR: /repos
      # Gateway URL used by pods to call back — must not be derived from request Host.
      # In local compose mode this defaults to http://gateway:3300 (set explicitly here).
      # In cloud mode SP_PUBLIC_GATEWAY_URL must point to the real external gateway hostname.
      SP_PUBLIC_GATEWAY_URL: http://localhost:3300
      # SP_GATEWAY_INTERNAL_URL not set — pods use K8s downward API (status.hostIP) instead.
      # Set this only if the automatic node IP detection doesn't work in your environment.
      # GitHub App (optional — leave empty to disable)
      SP_GITHUB_APP_ID: ${SP_GITHUB_APP_ID:-}
      SP_GITHUB_APP_CLIENT_ID: ${SP_GITHUB_APP_CLIENT_ID:-}
      SP_GITHUB_APP_CLIENT_SECRET: ${SP_GITHUB_APP_CLIENT_SECRET:-}
      SP_GITHUB_APP_PRIVATE_KEY: ${SP_GITHUB_APP_PRIVATE_KEY:-}
      SP_GITHUB_APP_SLUG: ${SP_GITHUB_APP_SLUG:-signalpilot}
      SP_WEB_URL: http://localhost:3200
      # Cloud mode: set SP_SESSION_JWT_SECRET to a 48-byte random secret.
      # Local mode: the gateway generates and persists /gateway-secrets/notebook_jwt_secret automatically.
      # SP_SESSION_JWT_SECRET: ${SP_SESSION_JWT_SECRET:-}
    volumes:
      - signalpilot-data:/data
      - signalpilot-shared:/shared
      - signalpilot-gateway-secrets:/gateway-secrets
      - signalpilot-repos:/repos
      - k3s-config:/k3s:ro
    command: >
      sh -c "python3 -c 'from gateway.store import get_local_api_key; k=get_local_api_key(); open(\"/shared/local_api_key\",\"w\").write(k) if k else None' &&
             uvicorn gateway.main:app --host 0.0.0.0 --port 3300"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../
      dockerfile: sp-dev-work/Dockerfile.web
    ports:
      - "3200:3200"
    volumes:
      - signalpilot-shared:/shared:ro
    depends_on:
      - gateway
    restart: unless-stopped

  sandbox:
    build:
      context: ./sp-sandbox
      dockerfile: ../Dockerfile.sandbox
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    mem_limit: 512m
    cpus: 2
    pids_limit: 256
    environment:
      SP_GATEWAY_URL: http://gateway:3300
      SP_SANDBOX_TOKEN: ${SP_SANDBOX_TOKEN:-}
      SP_MAX_VMS: "10"
    volumes:
      - ${HOST_DATA_DIR:-/tmp}:/host-data:ro
    restart: unless-stopped

  # workspaces-api and workspaces-web are disabled until the workspaces/ directory is set up.
  # workspaces-api:
  #   build:
  #     context: ./workspaces/api
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3400:3400"
  #   environment:
  #     WORKSPACES_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-signalpilot}:${POSTGRES_PASSWORD:-changeme_dev_only}@db:5432/${POSTGRES_DB:-signalpilot}
  #     SP_DEPLOYMENT_MODE: ${SP_DEPLOYMENT_MODE:-local}
  #     CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
  #     SP_GATEWAY_URL: http://gateway:3300
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: on-failure
  #
  # workspaces-web:
  #   build:
  #     context: .
  #     dockerfile: workspaces/web/Dockerfile
  #   ports:
  #     - "3500:3500"
  #   environment:
  #     WORKSPACES_API_URL: http://workspaces-api:3400
  #   volumes:
  #     - signalpilot-shared:/shared:ro
  #   depends_on:
  #     - workspaces-api
  #   restart: unless-stopped

volumes:
  signalpilot-pg-data:
  signalpilot-data:
  signalpilot-shared:
  # Gateway-private volume for JWT signing secrets — NOT mounted into web or any other service.
  signalpilot-gateway-secrets:
  # Bare git repos — Docker volume for dev, EFS mount for production.
  signalpilot-repos:
  signalpilot-minio-data:
  k3s-server:
  k3s-config:

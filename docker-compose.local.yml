# SignalPilot — Local Mode (no K8s pods)
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Replaces K3s pod orchestration with a single notebook-server container.
# Faster startup, simpler debugging, no K8s overhead.

services:
  # ─── Notebook Server (replaces K8s pods) ─────────────────────────
  notebook:
    build:
      context: ./signalpilot/notebook-server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:2718:2718"
    entrypoint: ["sh", "-c", "export SP_API_KEY=$(cat /shared/local_api_key 2>/dev/null || echo ''); exec python -m signalpilot edit --host 0.0.0.0 --port 2718 --headless --no-token --no-skew-protection --allow-origins http://localhost:3200,http://localhost:3300 /workspace"]
    environment:
      SP_LOG_DIR: /tmp/sp-logs
      SP_LOG_LEVEL: "10"
      SP_GATEWAY_URL: http://gateway:3300
      SP_GATEWAY_INTERNAL_URL: http://gateway:3300
      SP_WEB_URL: ${SP_WEB_URL:-http://localhost:3200}
      CLAUDE_CONFIG_DIR: ${CLAUDE_CONFIG_DIR:-/home/notebook/.claude}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - signalpilot-workspace:/workspace
      - signalpilot-shared:/shared:ro
      - ${CLAUDE_HOST_CONFIG_DIR:-${HOME}/.config/signalpilot/claude-code-docker}:/home/notebook/.claude
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2718/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ─── Override gateway to use local notebook instead of K8s ───────
  gateway:
    environment:
      SP_NOTEBOOK_UPSTREAM_MODE: direct
      SP_NOTEBOOK_DIRECT_URL: http://notebook:2718
      SP_K8S_HOST: ""
      KUBECONFIG: ""
    depends_on:
      db:
        condition: service_healthy
      notebook:
        condition: service_healthy
      sandbox:
        condition: service_healthy

  # ─── Disable K3s in local mode ──────────────────────────────────
  k3s:
    profiles:
      - k8s-only

volumes:
  signalpilot-workspace:
